<div class="home-container">

  <h1>Todos os momentos compartilhados</h1>

  <!-- Adicionar opção para busca! -->

  <ul>
    <li *ngFor="let moment of allMoments">
      <h2>Título: {{ moment.title }}</h2>
      <p>Descrição: {{ moment.description }}</p>
      <p>Data: {{ moment.created_at | date:'dd/MM/yyyy' }}</p>
    </li>
  </ul>

</div>
