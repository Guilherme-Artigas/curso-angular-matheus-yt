<div class="moment" *ngIf="moment">

  <h1>{{ moment.title }}</h1>
  <img src="{{ apiUrl }}/uploads/{{ moment.image }}" alt="{{ moment.title }}">

  <div class="about-moment">
    <h3>Sobre esse momento.</h3>

    <p>{{ moment.description }}</p>
  </div>

  <div class="actions">
    <h3>Ações:</h3>

    <a routerLink="/moments/edit/{{moment.id}}" class="edit-btn">
      <fa-icon [icon]="faEdit"></fa-icon> Editar
    </a>

    <button class="remove-btn" (click)="delete(moment.id!)">
      <fa-icon [icon]="faTimes"></fa-icon> Excluir
    </button>
  </div>

  <div class="comments">
    <h3>Comentários ({{ moment.comments?.length }})</h3>

    <div *ngIf="moment.comments!.length > 0; else noComments">
      <div class="comment-container" *ngFor="let comment of moment.comments">
        <p class="comment">{{ comment.text }}</p>
        <p class="author"><span>por: </span> {{ comment.username }}</p>
      </div>
    </div>

    <ng-template #noComments>
      <p>Não há comentários.</p>
    </ng-template>
  </div>

  <div class="comment-form">
    <h3>Deixe um comentário: </h3>

    <form [formGroup]="commentForm" #formDir="ngForm" (ngSubmit)="createComment(formDir)">
      <div class="form-group">
        <label for="text">Comentário: </label>
        <textarea formControlName="text" placeholder="Escreva seu comentário..." required></textarea>
        <div *ngIf="text.invalid && formDir.submitted" class="validation-error">
          <p *ngIf="text.errors?.['required']">Texto é obrigatório.</p>
        </div>
      </div>

      <div class="form-group">
        <label for="username">Nome: </label>
        <input type="text" formControlName="username" placeholder="Digite seu nome" required>
        <div *ngIf="username.invalid && formDir.submitted" class="validation-error">
          <p *ngIf="username.errors?.['required']">Nome de usuário é obrigatório.</p>
        </div>
      </div>

      <input type="submit" value="Comentar!">
    </form>
  </div>

</div>
